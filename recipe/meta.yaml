{% set name = "vivid" %}
{% set version = "0.11.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/sharkdp/vivid/archive/v{{ version }}.tar.gz
  sha256: 2d31f72ac9df81ddc8b5ecb9e5e539c754c22863ada3e76e4c1a88ee53c99a21

build:
  number: 0

requirements:
  build:
    - {{ compiler('cxx') }}  # [linux]
    - {{ stdlib("c") }}    # [linux]
    - {{ compiler('rust') }}
    - cargo-bundle-licenses
  run:

test:
  commands:
    - vivid --help

about:
  home: https://github.com/sharkdp/vivid
  license: Apache-2.0
  license_family: Apache
  license_file:
    - LICENSE-APACHE
    - LICENSE-MIT
    - THIRDPARTY.yml
  summary: A themeable LS_COLORS generator with a rich filetype datebase
  dev_url: https://github.com/sharkdp/vivid

extra:
  recipe-maintainers:
    - anjos
